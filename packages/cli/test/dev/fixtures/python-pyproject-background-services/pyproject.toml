[project]
name = "python-pyproject-background-services"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "celery==5.5.3",
    "fastapi==0.133.0",
    "vercel==0.5.9",
]

[tool.vercel]
entrypoint = "main:app"

[tool.vercel.subscribers.celery-worker]
entrypoint = "worker:app"
topics = ["celery"]

[tool.vercel.crons.cleanup]
entrypoint = "jobs.cleanup:crons"
