[workspace]
resolver = "3"
members = [
    "crates/*",
]

[workspace.package]
edition = "2024"
publish = false
rust-version = "1.90"

[workspace.dependencies]
csv = "1.3.0"
memchr = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
unscanny = "0.1"
url = "2"
wit-bindgen = { version = "0.51", features = ["macros"] }
wit-bindgen-rust = { version = "0.51" }
wit-parser = { version = "0.244", default-features = false }

uv-distribution-filename = { git = "https://github.com/astral-sh/uv", rev = "35d1e90961c1c2bd238ee6b015f970c0cf97f5d5" }
uv-git-types = { git = "https://github.com/astral-sh/uv", rev = "35d1e90961c1c2bd238ee6b015f970c0cf97f5d5" }
uv-normalize = { git = "https://github.com/astral-sh/uv", rev = "35d1e90961c1c2bd238ee6b015f970c0cf97f5d5" }
uv-pep508 = { git = "https://github.com/astral-sh/uv", rev = "35d1e90961c1c2bd238ee6b015f970c0cf97f5d5", features = ["non-pep508-extensions"] }
uv-pypi-types = { git = "https://github.com/astral-sh/uv", rev = "35d1e90961c1c2bd238ee6b015f970c0cf97f5d5" }
uv-redacted = { git = "https://github.com/astral-sh/uv", rev = "35d1e90961c1c2bd238ee6b015f970c0cf97f5d5" }

[patch."https://github.com/astral-sh/uv"]
uv-fs = { path = "crates/uv-fs-stub" }
uv-pypi-types = { path = "crates/uv-pypi-types-stub" }

[patch.crates-io]
idna = { path = "crates/idna-stub" }
regex = { path = "crates/regex-stub" }
unicode-normalization = { path = "crates/unicode-normalization-stub" }
unicode_names2 = { path = "crates/unicode-names2-stub" }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true

[profile.analysis]
inherits = "release"
opt-level = "z"
lto = false
codegen-units = 1
strip = false
debug = "line-tables-only"
