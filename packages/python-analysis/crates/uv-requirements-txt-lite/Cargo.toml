# Lite extraction of uv-requirements-txt: synchronous parsing only.
# Drops async I/O, HTTP fetching, uv-client, uv-configuration, uv-distribution-types.
# Content is passed as a string; file I/O and recursion handled by the TypeScript caller.
[package]
name = "uv-requirements-txt-lite"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true

[lib]
doctest = false

[dependencies]
uv-pep508.workspace = true
uv-distribution-filename.workspace = true
uv-git-types.workspace = true
uv-redacted.workspace = true
memchr = "2"
thiserror = "2"
unscanny = "0.1"
url = "2"
