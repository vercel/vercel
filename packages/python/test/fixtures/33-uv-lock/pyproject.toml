[project]
name = "fixture-uv-lock-fastapi"
version = "0.0.1"
requires-python = ">=3.12"
dependencies = [
  "fastapi",
]

[project.optional-dependencies]
mypy = [
  "mypy",
]

[dependency-groups]
dev = [
  "ruff",
]

# We put a fixed exclude-newer here to ensure that vercel-runtime
# works even when it is too new.
[tool.uv]
exclude-newer = "2026-06-07T00:54:18.627444Z"
