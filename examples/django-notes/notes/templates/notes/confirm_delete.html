{% extends "notes/base.html" %}

{% block title %}Delete Note{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Delete Note</h1>
</div>

<div class="form-card">
    <h2>{{ note.title }}</h2>
    <p style="color: #888888; margin-bottom: 2rem;">
        This action cannot be undone.
    </p>

    <div class="btn-group">
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, delete</button>
        </form>
        <a href="{% url 'note_detail' note.pk %}" class="btn">Cancel</a>
    </div>
</div>
{% endblock %}
