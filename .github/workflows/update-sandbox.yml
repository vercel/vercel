name: Update Sandbox

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Sandbox CLI version to sync into packages/cli'
        required: false
        type: string
      source_repository:
        description: 'Repository that triggered the sync'
        required: false
        type: string
      source_run_id:
        description: 'GitHub Actions run ID that triggered the sync'
        required: false
        type: string
  schedule:
    - cron: '0 14 * * *'

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable pnpm

      - name: Create Pull Request
        uses: actions/github-script@v7
        env:
          SANDBOX_VERSION: ${{ inputs.version }}
          SOURCE_REPOSITORY: ${{ inputs.source_repository }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        with:
          github-token: ${{ secrets.VERCEL_CLI_RELEASE_BOT_TOKEN }}
          script: |
            const script = require('./utils/update-sandbox.js');
            await script({ github, context });
