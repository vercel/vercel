name: Validate Windows Binary (experimental)

# Builds the Windows binary on a real Windows runner, smoke-tests --version,
# then runs `vercel dev -L` and curls a forked function endpoint. Validates
# the bunfs path detector, the child_process fork shim, and sidecar
# resolution on Windows. Never uploads.
#
on:
  push:
    branches:
      - 'melkey/bun-*'
      - 'bun/**'
  pull_request:
    paths:
      - 'packages/cli/scripts/build-binary.mjs'
      - 'packages/cli/src/util/build/import-builders.ts'
      - 'packages/cli/src/util/is-bun-binary.ts'
      - 'packages/cli/src/util/telemetry/index.ts'
      - 'packages/node/src/fork-dev-server.ts'
      - 'packages/node/src/start-dev-server.ts'
      - 'packages/static-build/src/utils/gatsby.ts'
      - 'packages/fs-detectors/src/detect-framework.ts'
      - '.github/workflows/validate-windows.yml'
  workflow_dispatch:

concurrency:
  group: validate-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: bun-windows-x64
            asset: vercel-windows-x64
          # Native Windows ARM cannot install this repo while the dependency
          # graph includes esbuild@0.11.x, which has no win32-arm64 package.
          # Build the ARM64 executable from Linux and runtime-smoke x64 on Windows.
          - runner: ubuntu-latest
            target: bun-windows-arm64
            asset: vercel-windows-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-wasip2

      - uses: actions/setup-python@v6
        with:
          python-version-file: 'pyproject.toml'

      - uses: astral-sh/setup-uv@v7

      - name: Install pnpm
        shell: bash
        run: npm i -g pnpm@8.3.1

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        shell: bash
        run: pnpm build
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Build binary
        shell: bash
        working-directory: packages/cli
        env:
          BUN_TARGET: ${{ matrix.target }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: node scripts/build-binary.mjs

      - name: Smoke test (--version)
        if: matrix.target == 'bun-windows-x64'
        shell: bash
        working-directory: packages/cli
        run: |
          out=$(./dist-bin/${{ matrix.asset }}.exe --version)
          echo "$out"
          test -n "$out"

      - name: Integration smoke (vc dev forks a sidecar)
        if: matrix.target == 'bun-windows-x64'
        shell: bash
        working-directory: packages/cli
        run: |
          # Build a tiny fixture and run vc dev against it
          mkdir -p /tmp/fixture/api
          echo '{"name":"win-test","type":"module"}' > /tmp/fixture/package.json
          echo '{}' > /tmp/fixture/vercel.json
          cat > /tmp/fixture/api/hello.js <<'JS'
          export default function handler(req, res) {
            res.status(200).json({ hello: "world", platform: process.platform });
          }
          JS

          BIN="$PWD/dist-bin/${{ matrix.asset }}.exe"
          cd /tmp/fixture

          # Start dev server in background
          NO_UPDATE_NOTIFIER=1 VERCEL_TELEMETRY_DISABLED=1 \
            "$BIN" dev -L --listen 4444 --debug > /tmp/dev.log 2>&1 &
          DEVPID=$!

          # Wait up to 30s for "Ready!" line
          for i in $(seq 1 30); do
            if grep -q "Ready! Available" /tmp/dev.log 2>/dev/null; then
              echo "dev server ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Hit the endpoint
          response=$(curl -s -m 10 http://localhost:4444/api/hello || true)
          echo "Response: $response"

          # Kill dev server
          kill $DEVPID 2>/dev/null || true

          echo "=== dev.log tail ==="
          tail -40 /tmp/dev.log

          # Assert
          echo "$response" | grep -q '"hello":"world"'

      - name: Upload artifact (inspection only)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: packages/cli/dist-bin/${{ matrix.asset }}.exe
          retention-days: 3
          if-no-files-found: error

  test-windows-arm64:
    name: vercel-windows-arm64 runtime
    needs: build
    runs-on: windows-11-arm
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vercel-windows-arm64
          path: dist-bin

      - name: Smoke test (--version)
        shell: pwsh
        run: |
          $out = .\dist-bin\vercel-windows-arm64.exe --version
          Write-Output $out
          if (-not $out) { throw "No version output" }

      - name: Integration smoke (vc dev forks a sidecar)
        shell: pwsh
        run: |
          $fixture = Join-Path $env:RUNNER_TEMP "fixture"
          $api = Join-Path $fixture "api"
          New-Item -ItemType Directory -Force -Path $api | Out-Null
          Set-Content -Path (Join-Path $fixture "package.json") -Value '{"name":"win-arm-test","type":"module"}'
          Set-Content -Path (Join-Path $fixture "vercel.json") -Value '{}'
          Set-Content -Path (Join-Path $api "hello.js") -Value @'
          export default function handler(req, res) {
            res.status(200).json({ hello: "world", platform: process.platform, arch: process.arch });
          }
          '@

          $bin = Resolve-Path ".\dist-bin\vercel-windows-arm64.exe"
          $stdoutLog = Join-Path $env:RUNNER_TEMP "dev-arm64.out.log"
          $stderrLog = Join-Path $env:RUNNER_TEMP "dev-arm64.err.log"
          $env:NO_UPDATE_NOTIFIER = "1"
          $env:VERCEL_TELEMETRY_DISABLED = "1"

          $proc = Start-Process -FilePath $bin -ArgumentList "dev", "-L", "--listen", "4444", "--debug" -WorkingDirectory $fixture -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog -PassThru
          try {
            for ($i = 1; $i -le 45; $i++) {
              if (
                ((Test-Path $stdoutLog) -and (Select-String -Path $stdoutLog -Pattern "Ready! Available" -Quiet)) -or
                ((Test-Path $stderrLog) -and (Select-String -Path $stderrLog -Pattern "Ready! Available" -Quiet))
              ) {
                Write-Output "dev server ready after ${i}s"
                break
              }
              Start-Sleep -Seconds 1
            }

            $response = ""
            for ($i = 1; $i -le 60; $i++) {
              try {
                $response = Invoke-WebRequest -UseBasicParsing -TimeoutSec 10 -Uri "http://localhost:4444/api/hello" | Select-Object -ExpandProperty Content
              } catch {
                $response = ""
              }
              if ($response -match '"hello":"world"') { break }
              Start-Sleep -Seconds 1
            }

            Write-Output "Response: $response"
            Write-Output "=== dev stdout tail ==="
            if (Test-Path $stdoutLog) { Get-Content $stdoutLog -Tail 80 }
            Write-Output "=== dev stderr tail ==="
            if (Test-Path $stderrLog) { Get-Content $stderrLog -Tail 80 }
            if ($response -notmatch '"hello":"world"') { throw "missing hello:world in response" }
          } finally {
            if ($proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            }
          }
