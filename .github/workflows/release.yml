name: Release

on:
  push:
    branches:
      - main

env:
  TURBO_REMOTE_ONLY: 'true'
  TURBO_TEAM: 'vercel'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: release # Must be kept for trusted publishing on PyPI
    permissions:
      contents: write
      id-token: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Necessary for the publish step to work since it uses HEAD^ to determine if the version has changed
          fetch-depth: 2

      - name: Fetch git tags
        run: git fetch origin 'refs/tags/*:refs/tags/*'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: wasm32-wasip2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: 'pyproject.toml'

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          version: '0.10.11'

      - name: install npm@11
        run: npm i -g npm@11

      - name: install pnpm@8.3.1
        run: npm i -g pnpm@8.3.1

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Packages
        run: pnpm build
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Block trusted publish for new npm packages
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            function getChangedPackageJsonPaths() {
              const output = execSync('git diff --name-only HEAD^ HEAD', {
                encoding: 'utf8',
              });

              return output
                .split('\n')
                .map(line => line.trim())
                .filter(Boolean)
                .filter(filename => filename.endsWith('/package.json'));
            }

            async function packageExistsOnNpm(packageName) {
              const response = await fetch(
                `https://registry.npmjs.org/${encodeURIComponent(packageName)}`
              );

              if (response.status === 404) {
                return false;
              }

              if (!response.ok) {
                throw new Error(
                  `NPM registry lookup failed for ${packageName} with status ${response.status}`
                );
              }

              return true;
            }

            const packageMap = new Map();

            for (const packageJsonPath of getChangedPackageJsonPaths()) {
              let packageJson;
              try {
                packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
              } catch (error) {
                core.warning(
                  `Skipping ${packageJsonPath}; unable to parse package.json: ${error.message}`
                );
                continue;
              }

              if (packageJson.private === true || typeof packageJson.name !== 'string') {
                continue;
              }

              packageMap.set(packageJson.name, packageJsonPath);
            }

            const unpublishedPackages = [];
            for (const [packageName, packageJsonPath] of packageMap) {
              const exists = await packageExistsOnNpm(packageName);
              if (!exists) {
                unpublishedPackages.push({
                  packageName,
                  packageJsonPath,
                });
              }
            }

            if (unpublishedPackages.length === 0) {
              core.info('All changed releasable packages already exist on npm.');
              return;
            }

            const packageList = unpublishedPackages
              .map(
                ({ packageName, packageJsonPath }) =>
                  `- ${packageName} (${packageJsonPath})`
              )
              .join('\n');

            core.setFailed(
              `Release blocked. Trusted publishing cannot publish first-time npm packages:\n${packageList}`
            );

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf
        with:
          version: pnpm ci:version
          publish: pnpm ci:publish # npm publish
          commitMode: "github-api" # allows release commits and tags to be signed using $GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      # TODO: re-enable with a new bot token or GitHub App
      # - name: Trigger Update (if a Publish Happened)
      #   if: steps.changesets.outputs.published == 'true'
      #   uses: actions/github-script@v7
      #   with:
      #     github-token: ${{ secrets.VERCEL_CLI_RELEASE_BOT_TOKEN }}
      #     script: |
      #       const script = require('./utils/trigger-update-workflow.js')
      #       await script({ github, context })

      # - name: Set latest Release to `vercel` (if a Publish Happened)
      #   if: steps.changesets.outputs.published == 'true'
      #   uses: actions/github-script@v7
      #   with:
      #     github-token: ${{ secrets.VERCEL_CLI_RELEASE_BOT_TOKEN }}
      #     script: |
      #       const script = require('./utils/update-latest-release.js')
      #       await script({ github, context })

  summary:
    name: Summary (release)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - release
    steps:
      - name: Check All
        run: echo OK
