name: Release Binary

on:
  push:
    tags:
      - 'vercel@*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build (e.g. vercel@53.3.1)
        required: true

permissions:
  contents: write
  id-token: write

env:
  TURBO_REMOTE_ONLY: 'true'
  TURBO_TEAM: 'vercel'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

concurrency:
  group: release-binary-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-15-xlarge
            target: node22.22.2-macos-arm64
            asset: vercel-darwin-arm64
            ext: ''
            sign: true
            smoke: true
            custom_node_path: .node-runtime/node-v22.22.2-darwin-arm64-small-icu/bin/node
            custom_node_platform: darwin
            custom_node_arch: arm64
          - runs-on: macos-15-large
            target: node22.22.2-macos-x64
            asset: vercel-darwin-x64
            ext: ''
            sign: true
            smoke: true
            custom_node_path: ''
            custom_node_platform: ''
            custom_node_arch: ''
          - runs-on: ubuntu-latest-32-core-arm-oss
            target: node22.22.2-linux-arm64
            asset: vercel-linux-arm64
            ext: ''
            sign: false
            smoke: true
            custom_node_path: .node-runtime/node-v22.22.2-linux-arm64-small-icu/bin/node
            custom_node_platform: linux
            custom_node_arch: arm64
          - runs-on: ubuntu-latest-32-core-oss
            target: node22.22.2-linux-x64
            asset: vercel-linux-x64
            ext: ''
            sign: false
            smoke: true
            custom_node_path: .node-runtime/node-v22.22.2-linux-x64-small-icu/bin/node
            custom_node_platform: linux
            custom_node_arch: x64
          - runs-on: windows-latest-8-core-oss
            target: node22.22.2-win-x64
            asset: vercel-windows-x64
            ext: '.exe'
            sign: false
            smoke: true
            custom_node_path: .node-runtime/node-v22.22.2-win-x64-small-icu/node.exe
            custom_node_platform: win
            custom_node_arch: x64
    runs-on: ${{ matrix['runs-on'] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          package-manager-cache: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          toolchain: stable
          targets: wasm32-wasip2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: 'pyproject.toml'

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          enable-cache: false

      - name: Install pnpm
        run: npm i -g pnpm@10.29.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux build tools
        if: ${{ matrix.custom_node_platform == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build workspace packages
        run: pnpm build
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Build custom Node runtime
        if: ${{ matrix.custom_node_path != '' }}
        env:
          VERCEL_CLI_NODE_VERSION: 22.22.2
          VERCEL_CLI_NODE_PLATFORM: ${{ matrix.custom_node_platform }}
          VERCEL_CLI_NODE_ARCH: ${{ matrix.custom_node_arch }}
        run: pnpm turbo --no-update-notifier --root-turbo-json turbo.node-runtime.json run //#build-binary-node --output-logs=new-only

      - name: Build binary
        working-directory: packages/cli
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VERCEL_CLI_BINARY_NODE_PATH: ${{ matrix.custom_node_path }}
        run: node scripts/build-binary.mjs --target ${{ matrix.target }} --compress Brotli --output ./dist-bin/${{ matrix.asset }}${{ matrix.ext }}

      - name: Smoke test binary before signing
        shell: bash
        working-directory: packages/cli
        run: |
          set -euo pipefail
          bin="dist-bin/${{ matrix.asset }}${{ matrix.ext }}"
          chmod +x "$bin" || true
          node scripts/smoke-test-binary.mjs "$bin"

      - name: Install rcodesign
        if: ${{ matrix.sign }}
        run: cargo install apple-codesign --locked

      - name: Write Apple signing certificate
        if: ${{ matrix.sign }}
        shell: bash
        env:
          APPLE_CERT_DATA: ${{ secrets.APPLE_CERT_DATA }}
          APPLE_CERT_PATH: ${{ runner.temp }}/apple-certificate.p12
        run: |
          set -euo pipefail
          if [[ -z "$APPLE_CERT_DATA" ]]; then
            echo "::error::APPLE_CERT_DATA secret is empty or unavailable"
            exit 1
          fi
          echo "$APPLE_CERT_DATA" | base64 --decode > "$APPLE_CERT_PATH"
          if [[ ! -s "$APPLE_CERT_PATH" ]]; then
            echo "::error::Decoded Apple certificate is empty"
            exit 1
          fi
          echo "APPLE_CERT_PATH=$APPLE_CERT_PATH" >> "$GITHUB_ENV"

      - name: Write Apple notarization API key
        if: ${{ matrix.sign }}
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple-api-key.json
        run: |
          set -euo pipefail
          if [[ -z "$APPLE_API_KEY" ]]; then
            echo "::error::APPLE_API_KEY secret is empty or unavailable"
            exit 1
          fi
          echo "$APPLE_API_KEY" | base64 --decode > "$APPLE_API_KEY_PATH"
          if [[ ! -s "$APPLE_API_KEY_PATH" ]]; then
            echo "::error::Decoded Apple API key is empty"
            exit 1
          fi
          echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Sign binary
        if: ${{ matrix.sign }}
        shell: bash
        working-directory: packages/cli
        env:
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          VERCEL_CLI_APPLE_SIGNING_IDENTIFIER: com.vercel.vercel-cli
        run: |
          set -euo pipefail
          bin="dist-bin/${{ matrix.asset }}${{ matrix.ext }}"
          rcodesign sign \
            --for-notarization \
            --binary-identifier "$VERCEL_CLI_APPLE_SIGNING_IDENTIFIER" \
            --entitlements-xml-path entitlements.plist \
            --p12-file "$APPLE_CERT_PATH" \
            --p12-password "$APPLE_CERT_PASSWORD" \
            "$bin"

          requirement=$(codesign -dr - "$bin" 2>&1)
          printf '%s\n' "$requirement"
          expected_identifier="identifier \"$VERCEL_CLI_APPLE_SIGNING_IDENTIFIER\""
          if [[ "$requirement" != *"$expected_identifier"* ]]; then
            echo "::error::Expected designated requirement to contain $expected_identifier"
            exit 1
          fi
      - name: Notarize binary
        if: ${{ matrix.sign }}
        shell: bash
        working-directory: packages/cli
        run: |
          set -euo pipefail
          bin="dist-bin/${{ matrix.asset }}${{ matrix.ext }}"
          zip_path="$RUNNER_TEMP/${{ matrix.asset }}${{ matrix.ext }}.zip"
          ditto -c -k --keepParent "$bin" "$zip_path"
          rcodesign notary-submit \
            --api-key-file "$APPLE_API_KEY_PATH" \
            --wait \
            "$zip_path"
      - name: Smoke test binary after signing
        if: ${{ matrix.smoke }}
        shell: bash
        working-directory: packages/cli
        run: |
          set -euo pipefail
          bin="dist-bin/${{ matrix.asset }}${{ matrix.ext }}"
          chmod +x "$bin" || true
          node scripts/smoke-test-binary.mjs "$bin"

      - name: Compute checksum
        shell: bash
        working-directory: packages/cli
        run: |
          file="dist-bin/${{ matrix.asset }}${{ matrix.ext }}"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            shasum -a 256 "$file" > "$file.sha256"
          else
            sha256sum "$file" > "$file.sha256"
          fi
          cat "$file.sha256"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}${{ matrix.ext }}
          path: packages/cli/dist-bin/${{ matrix.asset }}${{ matrix.ext }}
          retention-days: 3
          if-no-files-found: error

      - name: Wait for GitHub Release
        if: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          release_url="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases/tags/$TAG"
          for i in $(seq 1 30); do
            response="$(mktemp)"
            status="$(curl -sS -L -o "$response" -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$release_url")"

            if [[ "$status" == "200" ]]; then
              echo "Release $TAG ready"
              exit 0
            fi
            if [[ "$status" != "404" ]]; then
              cat "$response"
            fi
            echo "Waiting for release $TAG to be created ($i/30)..."
            sleep 10
          done
          echo "::error::Timed out waiting for release $TAG after 5 minutes"
          exit 1

      - name: Upload to GitHub Release
        if: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
        shell: bash
        working-directory: packages/cli
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          auth_headers=(
            -H "Authorization: Bearer $GH_TOKEN"
            -H "Accept: application/vnd.github+json"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )
          release_json="$(mktemp)"
          status="$(curl -sS -L -o "$release_json" -w "%{http_code}" \
            "${auth_headers[@]}" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases/tags/$TAG")"

          if [[ "$status" != "200" ]]; then
            cat "$release_json"
            echo "::error::Could not fetch GitHub Release $TAG"
            exit 1
          fi

          release_id="$(node -e "const fs = require('fs'); console.log(JSON.parse(fs.readFileSync(process.argv[1], 'utf8')).id)" "$release_json")"
          upload_url="$(node -e "const fs = require('fs'); console.log(JSON.parse(fs.readFileSync(process.argv[1], 'utf8')).upload_url.split('{')[0])" "$release_json")"

          request() {
            local output="$1"
            shift
            local status
            status="$(curl -sS -L -o "$output" -w "%{http_code}" "$@")"
            if [[ "$status" -lt 200 || "$status" -ge 300 ]]; then
              cat "$output"
              echo "::error::GitHub API request failed with HTTP $status"
              exit 1
            fi
          }

          upload_asset() {
            local file="$1"
            local name
            name="$(basename "$file")"
            local encoded_name
            encoded_name="$(node -e "console.log(encodeURIComponent(process.argv[1]))" "$name")"

            local assets_json
            assets_json="$(mktemp)"
            request "$assets_json" \
              "${auth_headers[@]}" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases/$release_id/assets?per_page=100"

            local existing_asset_id
            existing_asset_id="$(node -e "const fs = require('fs'); const assets = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); const asset = assets.find(asset => asset.name === process.argv[2]); console.log(asset?.id ?? '')" "$assets_json" "$name")"

            if [[ -n "$existing_asset_id" ]]; then
              request /dev/null \
                -X DELETE \
                "${auth_headers[@]}" \
                "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases/assets/$existing_asset_id"
            fi

            request /dev/null \
              -X POST \
              "${auth_headers[@]}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$file" \
              "$upload_url?name=$encoded_name"
          }

          upload_asset "dist-bin/${{ matrix.asset }}${{ matrix.ext }}"
          upload_asset "dist-bin/${{ matrix.asset }}${{ matrix.ext }}.sha256"

  publish-npm:
    name: Publish native npm packages
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install npm 11
        run: npm i -g npm@11

      - name: Print npm version
        run: npm --version

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages/cli/dist-bin
          merge-multiple: true

      - name: Publish native npm packages
        shell: bash
        env:
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            node packages/vc-native/scripts/publish-packages.mjs
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            version="$(node -p "require('./packages/cli/package.json').version")"
            latest="$(npm view vercel version)"
            if [[ "$version" == "$latest" ]]; then
              node packages/vc-native/scripts/publish-packages.mjs
            else
              node packages/vc-native/scripts/publish-packages.mjs --tag "rebuild-$version"
            fi
          else
            node packages/vc-native/scripts/publish-packages.mjs --dry-run
          fi

      - name: Verify @vercel/vc-native global install
        if: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./packages/cli/package.json').version")"
          for i in $(seq 1 12); do
            prefix="$(mktemp -d)"
            cache="$(mktemp -d)"
            if npm --cache "$cache" install -g --prefix "$prefix" "@vercel/vc-native@$version" --force && [[ -x "$prefix/bin/vercel" ]]; then
              out="$($prefix/bin/vercel --version)"
              echo "$out"
              if [[ "$out" == "$version" ]]; then
                node packages/cli/scripts/smoke-test-binary.mjs "$prefix/bin/vercel"
                exit 0
              fi
            fi
            echo "Waiting for @vercel/vc-native to become installable ($i/12)..."
            sleep 10
          done
          echo "::error::@vercel/vc-native did not install a working vercel binary for $version"
          exit 1
