name: Release Binary

on:
  push:
    branches:
      - melkey/bun-working-branch
    tags:
      - 'vercel@*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build (e.g. vercel@52.0.0)
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-binary-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: bun-darwin-arm64
            asset: vercel-darwin-arm64
            ext: ''
          - runner: macos-15-intel
            target: bun-darwin-x64
            asset: vercel-darwin-x64
            ext: ''
          - runner: ubuntu-latest
            target: bun-linux-arm64
            asset: vercel-linux-arm64
            ext: ''
          - runner: ubuntu-latest
            target: bun-linux-x64
            asset: vercel-linux-x64
            ext: ''
          - runner: ubuntu-latest
            target: bun-linux-arm64-musl
            asset: vercel-linux-arm64-musl
            ext: ''
          - runner: ubuntu-latest
            target: bun-linux-x64-musl
            asset: vercel-linux-x64-musl
            ext: ''
          - runner: windows-latest
            target: bun-windows-x64
            asset: vercel-windows-x64
            ext: '.exe'
          # Native Windows ARM cannot install esbuild@0.11.x.
          - runner: ubuntu-latest
            target: bun-windows-arm64
            asset: vercel-windows-arm64
            ext: '.exe'
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
          no-cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          toolchain: stable
          targets: wasm32-wasip2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: 'pyproject.toml'

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          enable-cache: false

      - name: Install pnpm
        run: npm i -g pnpm@8.3.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Build binary
        working-directory: packages/cli
        env:
          BUN_TARGET: ${{ matrix.target }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: node scripts/build-binary.mjs

      - name: Install rcodesign
        if: ${{ runner.os == 'macOS' }}
        run: cargo install apple-codesign --locked

      - name: Write Apple signing certificate
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        env:
          APPLE_CERT_DATA: ${{ secrets.APPLE_CERT_DATA }}
          APPLE_CERT_PATH: ${{ runner.temp }}/apple-certificate.p12
        run: |
          set -euo pipefail
          if [[ -z "$APPLE_CERT_DATA" ]]; then
            echo "::error::APPLE_CERT_DATA secret is empty or unavailable"
            exit 1
          fi
          echo "$APPLE_CERT_DATA" | base64 --decode > "$APPLE_CERT_PATH"
          if [[ ! -s "$APPLE_CERT_PATH" ]]; then
            echo "::error::Decoded Apple certificate is empty"
            exit 1
          fi
          echo "APPLE_CERT_PATH=$APPLE_CERT_PATH" >> "$GITHUB_ENV"

      - name: Sign binary
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        working-directory: packages/cli
        env:
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          rcodesign sign \
            --for-notarization \
            --entitlements-xml-path entitlements.plist \
            --p12-file "$APPLE_CERT_PATH" \
            --p12-password "$APPLE_CERT_PASSWORD" \
            "dist-bin/${{ matrix.asset }}${{ matrix.ext }}"

      - name: Smoke test binary version
        if: ${{ matrix.target == 'bun-darwin-arm64' || matrix.target == 'bun-darwin-x64' || matrix.target == 'bun-linux-x64' || matrix.target == 'bun-windows-x64' }}
        shell: bash
        working-directory: packages/cli
        run: |
          set -euo pipefail
          bin="dist-bin/${{ matrix.asset }}${{ matrix.ext }}"
          chmod +x "$bin" || true
          out=$(./"$bin" --version)
          echo "$out"
          test -n "$out"

      - name: Compute checksum
        shell: bash
        working-directory: packages/cli
        run: |
          file="dist-bin/${{ matrix.asset }}${{ matrix.ext }}"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            shasum -a 256 "$file" > "$file.sha256"
          else
            sha256sum "$file" > "$file.sha256"
          fi
          cat "$file.sha256"

      - name: Upload binary artifact for npm packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}${{ matrix.ext }}
          path: packages/cli/dist-bin/${{ matrix.asset }}${{ matrix.ext }}
          retention-days: 3
          if-no-files-found: error

      # Changesets creates the release in release.yml; wait so we don't clobber it.
      - name: Wait for GitHub Release
        if: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          for i in $(seq 1 30); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Release $TAG ready"
              exit 0
            fi
            echo "Waiting for release $TAG to be created ($i/30)..."
            sleep 10
          done
          echo "::error::Timed out waiting for release $TAG after 5 minutes"
          exit 1

      - name: Upload to GitHub Release
        if: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
        shell: bash
        working-directory: packages/cli
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          gh release upload "$TAG" \
            "dist-bin/${{ matrix.asset }}${{ matrix.ext }}" \
            "dist-bin/${{ matrix.asset }}${{ matrix.ext }}.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  publish-native-npm:
    name: Publish native npm packages
    needs: build
    if: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install npm@11
        run: npm i -g npm@11

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages/cli/dist-bin
          merge-multiple: true

      - name: Stage native npm packages
        working-directory: packages/cli
        run: node scripts/stage-native-packages.mjs

      - name: Publish native npm packages
        working-directory: packages/cli
        env:
          NPM_CONFIG_PROVENANCE: 'true'
        run: node scripts/publish-native-packages.mjs
