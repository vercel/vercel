name: Validate Binary

# Pre-merge validation for the Bun-compiled binary. Builds + smoke-tests every
# Mac/Linux target on real CI runners. Never uploads. Companion to
# release-binary.yml, which only fires on `vercel@*` tags and does the upload.

on:
  push:
    branches:
      - 'melkey/bun-*'
      - 'bun/**'
  pull_request:
    paths:
      - 'packages/cli/scripts/build-binary.mjs'
      - 'packages/cli/src/util/build/import-builders.ts'
      - 'packages/cli/src/util/is-bun-binary.ts'
      - 'packages/cli/src/util/telemetry/index.ts'
      - 'packages/node/src/fork-dev-server.ts'
      - 'packages/node/src/start-dev-server.ts'
      - 'packages/static-build/src/utils/gatsby.ts'
      - 'packages/fs-detectors/src/detect-framework.ts'
      - '.github/workflows/validate-binary.yml'
      - '.github/workflows/release-binary.yml'
  workflow_dispatch:

concurrency:
  group: validate-binary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: bun-darwin-arm64
            asset: vercel-darwin-arm64
            ext: ''
          - runner: macos-13
            target: bun-darwin-x64
            asset: vercel-darwin-x64
            ext: ''
          - runner: ubuntu-latest
            target: bun-linux-arm64
            asset: vercel-linux-arm64
            ext: ''
          - runner: ubuntu-latest
            target: bun-linux-x64
            asset: vercel-linux-x64
            ext: ''
          - runner: ubuntu-latest
            target: bun-linux-arm64-musl
            asset: vercel-linux-arm64-musl
            ext: ''
          - runner: ubuntu-latest
            target: bun-linux-x64-musl
            asset: vercel-linux-x64-musl
            ext: ''
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-wasip2

      - uses: actions/setup-python@v6
        with:
          python-version-file: 'pyproject.toml'

      - uses: astral-sh/setup-uv@v7

      - name: Install pnpm
        run: npm i -g pnpm@8.3.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Build binary
        working-directory: packages/cli
        env:
          BUN_TARGET: ${{ matrix.target }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: node scripts/build-binary.mjs

      # Set up QEMU only for the cross-arch (linux-arm64*) entries so we can
      # exec arm64 binaries on the x64 ubuntu-latest runner.
      - name: Set up QEMU (cross-arch Docker)
        if: matrix.target == 'bun-linux-arm64' || matrix.target == 'bun-linux-arm64-musl'
        uses: docker/setup-qemu-action@v3

      # Smoke test --version on every matrix entry. macOS + linux-x64 exec
      # natively. Cross-arch and musl entries run inside a Docker container
      # whose libc / arch matches the binary.
      - name: Smoke test (--version)
        shell: bash
        working-directory: packages/cli
        run: |
          set -euo pipefail
          bin="dist-bin/${{ matrix.asset }}${{ matrix.ext }}"
          chmod +x "$bin" || true
          case "${{ matrix.target }}" in
            bun-darwin-arm64|bun-darwin-x64|bun-linux-x64)
              out=$(./"$bin" --version)
              ;;
            bun-linux-x64-musl)
              out=$(docker run --rm --platform linux/amd64 \
                -v "$PWD/dist-bin:/cli:ro" alpine:3.20 sh -c \
                "apk add --no-cache libstdc++ >/dev/null && /cli/${{ matrix.asset }} --version")
              ;;
            bun-linux-arm64)
              out=$(docker run --rm --platform linux/arm64 \
                -v "$PWD/dist-bin:/cli:ro" ubuntu:24.04 \
                /cli/${{ matrix.asset }} --version)
              ;;
            bun-linux-arm64-musl)
              out=$(docker run --rm --platform linux/arm64 \
                -v "$PWD/dist-bin:/cli:ro" alpine:3.20 sh -c \
                "apk add --no-cache libstdc++ >/dev/null && /cli/${{ matrix.asset }} --version")
              ;;
          esac
          echo "$out"
          test -n "$out"

      # Full integration smoke: start `vc dev -L`, curl /api/hello, assert
      # response. Exercises fork-of-self, sidecar resolution, BUILTIN_BUILDERS,
      # telemetry suppression — all the things that --version doesn't cover.
      - name: Integration smoke (vc dev -L + curl)
        shell: bash
        working-directory: packages/cli
        run: |
          set -euo pipefail
          bin_abs="$PWD/dist-bin/${{ matrix.asset }}${{ matrix.ext }}"

          # Build a fixture
          rm -rf /tmp/fixture && mkdir -p /tmp/fixture/api
          echo '{"name":"smoke","type":"module"}' > /tmp/fixture/package.json
          echo '{}' > /tmp/fixture/vercel.json
          cat > /tmp/fixture/api/hello.js <<'JS'
          export default function handler(req, res) {
            res.status(200).json({ hello: 'world', platform: process.platform, arch: process.arch });
          }
          JS

          assert_response() {
            local resp="$1"
            echo "Response: $resp"
            echo "$resp" | grep -q '"hello":"world"' || { echo "::error::missing hello:world in response"; return 1; }
          }

          case "${{ matrix.target }}" in
            bun-darwin-arm64|bun-darwin-x64|bun-linux-x64)
              # Native exec: run on host, curl localhost
              cd /tmp/fixture
              NO_UPDATE_NOTIFIER=1 VERCEL_TELEMETRY_DISABLED=1 \
                "$bin_abs" dev -L --listen 4444 --debug > /tmp/dev.log 2>&1 &
              DEVPID=$!
              for i in $(seq 1 30); do
                if grep -q "Ready! Available" /tmp/dev.log 2>/dev/null; then break; fi
                sleep 1
              done
              resp=$(curl -s -m 10 http://localhost:4444/api/hello || echo "")
              kill $DEVPID 2>/dev/null || true
              echo "=== dev.log tail ==="
              tail -30 /tmp/dev.log || true
              assert_response "$resp"
              ;;

            bun-linux-x64-musl|bun-linux-arm64|bun-linux-arm64-musl)
              # Docker exec: container starts dev server, host curls mapped port.
              # Picks image + platform + libstdc++ install based on target.
              case "${{ matrix.target }}" in
                bun-linux-x64-musl)
                  platform=linux/amd64; image=alpine:3.20; install='apk add --no-cache libstdc++' ;;
                bun-linux-arm64)
                  platform=linux/arm64; image=ubuntu:24.04; install=':' ;;
                bun-linux-arm64-musl)
                  platform=linux/arm64; image=alpine:3.20; install='apk add --no-cache libstdc++' ;;
              esac

              docker rm -f vctest 2>/dev/null || true
              docker run -d --name vctest --platform "$platform" \
                -p 4444:4444 \
                -v "$PWD/dist-bin:/cli:ro" \
                -v /tmp/fixture:/app \
                -w /app \
                -e NO_UPDATE_NOTIFIER=1 -e VERCEL_TELEMETRY_DISABLED=1 \
                "$image" \
                sh -c "$install >/dev/null && /cli/${{ matrix.asset }} dev -L --listen 4444 --debug"

              # Wait up to 90s — qemu emulation makes arm64 noticeably slower
              for i in $(seq 1 90); do
                if docker logs vctest 2>&1 | grep -q "Ready! Available"; then
                  echo "container ready after ${i}s"
                  break
                fi
                sleep 1
              done
              resp=$(curl -s -m 15 http://localhost:4444/api/hello || echo "")
              echo "=== container log tail ==="
              docker logs --tail 40 vctest 2>&1 || true
              docker rm -f vctest >/dev/null 2>&1 || true
              assert_response "$resp"
              ;;
          esac

      - name: Upload artifact (build inspection only, never released)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: packages/cli/dist-bin/${{ matrix.asset }}${{ matrix.ext }}
          retention-days: 3
          if-no-files-found: error
