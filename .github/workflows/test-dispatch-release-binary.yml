name: Test Dispatch Release Binary

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to pass through
        required: true
        default: vercel@54.4.1

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch smoke target
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'test-dispatch-target.yml',
              ref: 'melkey/fixing-release-binary-workflow',
              inputs: {
                tag: '${{ inputs.tag }}',
              },
            });
